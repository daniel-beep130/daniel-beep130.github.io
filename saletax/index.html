<!DOCTYPE html>
<html>
<head>
    <title>Sales Tax Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aldrich&family=Caveat:wght@400..700&family=Cinzel+Decorative:wght@400;700;900&family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=MedievalSharp&family=Playwrite+NZ+Basic:wght@100..400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="calculator">
        <h2>Sales Tax Calculator</h2>

        <label for="amount">Total Amount:</label>
        <input type="number" id="amount">

        <button id="calculate">Calculate</button>

        <label for="taxOutput">Tax:</label>
        <input type="text" id="taxOutput" disabled>

        <label for="totalOutput">Total:</label>
        <input type="text" id="totalOutput" disabled>
    </div>

    <script src="script.js"></script>
</body>
</html>
